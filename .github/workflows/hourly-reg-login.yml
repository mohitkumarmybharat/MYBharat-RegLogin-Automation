name: Hourly Registration + Login Test (Production)

on:
  schedule:
    # Run every 1 hour
    - cron: '0 * * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  reg-login-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Registration + Logout + Login Test
        id: test_run
        continue-on-error: true
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          mvn test \
            -Denv=prod \
            -Dbrowser=chrome \
            -DciMode=true \
            -Dsurefire.suiteXmlFiles=testSuites/testng-reg-logout-login.xml

      - name: Parse test results
        id: parse
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          PASSED=0; FAILED=0; SKIPPED=0
          if [ -f "$REPORT_FILE" ]; then
            for METHOD in registerNewYouth logoutAfterRegistration loginAfterLogout; do
              if grep -q "name=\"$METHOD\"" "$REPORT_FILE" 2>/dev/null; then
                if grep -A2 "name=\"$METHOD\"" "$REPORT_FILE" | grep -q 'status="FAIL"'; then
                  FAILED=$((FAILED + 1))
                elif grep -A2 "name=\"$METHOD\"" "$REPORT_FILE" | grep -q 'status="SKIP"'; then
                  SKIPPED=$((SKIPPED + 1))
                else
                  PASSED=$((PASSED + 1))
                fi
              else
                SKIPPED=$((SKIPPED + 1))
              fi
            done
          fi
          echo "total=3" >> $GITHUB_OUTPUT
          echo "passed=${PASSED}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED}" >> $GITHUB_OUTPUT

      - name: Determine status
        id: result
        if: always()
        run: |
          if [ "${{ steps.test_run.outcome }}" == "success" ]; then
            echo "status=✅ ALL TESTS PASSED" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=❌ SOME TESTS FAILED" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(TZ='Asia/Kolkata' date +'%d-%b-%Y %I:%M %p IST')" >> $GITHUB_OUTPUT

      - name: Extract registered email
        id: details
        if: always()
        run: |
          REG_EMAIL=$(grep -r '@yopmail.com' target/surefire-reports/ 2>/dev/null | grep -o '[a-zA-Z0-9]*@yopmail.com' | head -1 || echo "N/A")
          echo "reg_email=${REG_EMAIL:-N/A}" >> $GITHUB_OUTPUT

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reg-login-report-${{ github.run_number }}
          path: |
            reports/index.html
            reports/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Send email report
        if: always() && steps.test_run.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.result.outputs.status }} | Hourly Reg+Login | ${{ steps.result.outputs.timestamp }}"
          to: ${{ secrets.SENIOR_EMAILS }}
          from: "MY Bharat QA <${{ secrets.SMTP_USERNAME }}>"
          html_body: |
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto;">
              <div style="background: linear-gradient(135deg, #160363, #2d0a8f); padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
                <h1 style="color: #fff; margin: 0; font-size: 20px;">MY Bharat — Hourly Health Check</h1>
                <p style="color: #c4b5fd; margin: 5px 0 0; font-size: 12px;">Registration + Logout + Login (Production)</p>
              </div>

              <div style="background: ${{ steps.result.outputs.color }}; padding: 12px; text-align: center;">
                <h2 style="color: #fff; margin: 0; font-size: 18px;">${{ steps.result.outputs.status }}</h2>
              </div>

              <div style="padding: 20px; border: 1px solid #e0e0e0; border-top: none;">
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
                  <tr><td style="padding: 6px; font-weight: bold;">Time:</td><td style="padding: 6px;">${{ steps.result.outputs.timestamp }}</td></tr>
                  <tr style="background:#f9f9f9;"><td style="padding: 6px; font-weight: bold;">Environment:</td><td style="padding: 6px;">Production (https://mybharat.gov.in)</td></tr>
                  <tr><td style="padding: 6px; font-weight: bold;">Registered Email:</td><td style="padding: 6px;">${{ steps.details.outputs.reg_email }}</td></tr>
                </table>

                <table style="width: 100%; border-collapse: collapse; text-align: center; margin-bottom: 15px;">
                  <tr style="background: #160363; color: white;">
                    <th style="padding: 8px;">Total</th><th style="padding: 8px;">Passed</th><th style="padding: 8px;">Failed</th><th style="padding: 8px;">Skipped</th>
                  </tr>
                  <tr style="font-size: 18px; font-weight: bold;">
                    <td style="padding: 10px; border: 1px solid #ddd;">${{ steps.parse.outputs.total }}</td>
                    <td style="padding: 10px; border: 1px solid #ddd; color: #28a745;">${{ steps.parse.outputs.passed }}</td>
                    <td style="padding: 10px; border: 1px solid #ddd; color: #dc3545;">${{ steps.parse.outputs.failed }}</td>
                    <td style="padding: 10px; border: 1px solid #ddd; color: #ffc107;">${{ steps.parse.outputs.skipped }}</td>
                  </tr>
                </table>

                <h3 style="color: #160363; margin: 0 0 10px; border-bottom: 2px solid #160363; padding-bottom: 4px; font-size: 14px;">Test Steps</h3>
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                  <tr style="background: #f0f0f0;">
                    <th style="padding: 6px; text-align: left; border: 1px solid #ddd;">Step</th>
                    <th style="padding: 6px; text-align: left; border: 1px solid #ddd;">Test</th>
                    <th style="padding: 6px; text-align: left; border: 1px solid #ddd;">Description</th>
                  </tr>
                  <tr>
                    <td style="padding: 6px; border: 1px solid #ddd;">1</td>
                    <td style="padding: 6px; border: 1px solid #ddd;">registerNewYouth</td>
                    <td style="padding: 6px; border: 1px solid #ddd;">Register new user → OTP from Yopmail → Fill form → Submit</td>
                  </tr>
                  <tr style="background: #f9f9f9;">
                    <td style="padding: 6px; border: 1px solid #ddd;">2</td>
                    <td style="padding: 6px; border: 1px solid #ddd;">logoutAfterRegistration</td>
                    <td style="padding: 6px; border: 1px solid #ddd;">Clear session → Navigate to home</td>
                  </tr>
                  <tr>
                    <td style="padding: 6px; border: 1px solid #ddd;">3</td>
                    <td style="padding: 6px; border: 1px solid #ddd;">loginAfterLogout</td>
                    <td style="padding: 6px; border: 1px solid #ddd;">Sign In → OTP from Yopmail → Verify login success</td>
                  </tr>
                </table>

                <div style="text-align: center; margin: 20px 0;">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background: #160363; color: white; padding: 10px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 13px;">View Full Logs</a>
                </div>
              </div>

              <div style="background: #f8f9fa; padding: 10px; text-align: center; border-radius: 0 0 8px 8px; border: 1px solid #e0e0e0; border-top: none;">
                <p style="color: #888; font-size: 11px; margin: 0;">MY Bharat QA | Runs every 1 hour | GitHub Actions</p>
              </div>
            </div>
