name: Scheduled Test Execution — MY Bharat (Production)

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'
    # 4:00 PM IST = 10:30 AM UTC
    - cron: '30 10 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run Full Test Suite
        id: test_run
        continue-on-error: true
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          mvn test \
            -Denv=prod \
            -Dbrowser=headless \
            -Dsurefire.suiteXmlFiles=testSuites/testng-all-modules.xml \
            -Dwebdriver.chrome.driver=$(which chromedriver)
          echo "test_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Determine test result
        id: result
        run: |
          if [ "${{ steps.test_run.outcome }}" == "success" ]; then
            echo "status=✅ ALL TESTS PASSED" >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=❌ SOME TESTS FAILED" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi
          echo "timestamp=$(TZ='Asia/Kolkata' date +'%d-%b-%Y %I:%M %p IST')" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: parse
        if: always()
        run: |
          REPORT_FILE="target/surefire-reports/testng-results.xml"
          if [ -f "$REPORT_FILE" ]; then
            TOTAL=$(grep -oP 'total="\K[0-9]+' "$REPORT_FILE" | head -1)
            PASSED=$(grep -oP 'passed="\K[0-9]+' "$REPORT_FILE" | head -1)
            FAILED=$(grep -oP 'failed="\K[0-9]+' "$REPORT_FILE" | head -1)
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$REPORT_FILE" | head -1)
          else
            TOTAL="N/A"
            PASSED="N/A"
            FAILED="N/A"
            SKIPPED="N/A"
          fi
          echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Upload ExtentReport as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: reports/index.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/*.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Send report email to seniors
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.result.outputs.status }} | MY Bharat — Daily Test Report (${{ steps.result.outputs.timestamp }})"
          to: ${{ secrets.SENIOR_EMAILS }}
          from: "MY Bharat QA Automation <${{ secrets.SMTP_USERNAME }}>"
          html_body: |
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 700px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
              
              <!-- Header -->
              <div style="background: linear-gradient(135deg, #160363, #2d0a8f); padding: 30px; text-align: center;">
                <h1 style="color: #ffffff; margin: 0; font-size: 22px;">MY Bharat — QA Automation Report</h1>
                <p style="color: #c4b5fd; margin: 8px 0 0; font-size: 14px;">Production Environment | Daily Scheduled Run</p>
              </div>

              <!-- Status Banner -->
              <div style="background: ${{ steps.result.outputs.color }}; padding: 15px; text-align: center;">
                <h2 style="color: #ffffff; margin: 0; font-size: 20px;">${{ steps.result.outputs.status }}</h2>
              </div>

              <!-- Summary Table -->
              <div style="padding: 25px;">
                <h3 style="color: #333; margin-top: 0;">📊 Execution Summary</h3>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                  <tr style="background: #f8f9fa;">
                    <td style="padding: 12px; border: 1px solid #dee2e6; font-weight: bold; width: 50%;">🕐 Execution Time</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6;">${{ steps.result.outputs.timestamp }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 12px; border: 1px solid #dee2e6; font-weight: bold;">🌐 Environment</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6;">Production (mybharat.gov.in)</td>
                  </tr>
                  <tr style="background: #f8f9fa;">
                    <td style="padding: 12px; border: 1px solid #dee2e6; font-weight: bold;">🖥 Browser</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6;">Chrome (Headless)</td>
                  </tr>
                  <tr>
                    <td style="padding: 12px; border: 1px solid #dee2e6; font-weight: bold;">📋 Test Suite</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6;">testng-all-modules.xml</td>
                  </tr>
                </table>

                <!-- Test Results -->
                <h3 style="color: #333;">📈 Test Results</h3>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                  <tr style="background: #160363; color: white;">
                    <th style="padding: 12px; border: 1px solid #dee2e6;">Total</th>
                    <th style="padding: 12px; border: 1px solid #dee2e6;">Passed ✅</th>
                    <th style="padding: 12px; border: 1px solid #dee2e6;">Failed ❌</th>
                    <th style="padding: 12px; border: 1px solid #dee2e6;">Skipped ⏭</th>
                  </tr>
                  <tr style="text-align: center; font-size: 18px; font-weight: bold;">
                    <td style="padding: 12px; border: 1px solid #dee2e6;">${{ steps.parse.outputs.total }}</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6; color: #28a745;">${{ steps.parse.outputs.passed }}</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6; color: #dc3545;">${{ steps.parse.outputs.failed }}</td>
                    <td style="padding: 12px; border: 1px solid #dee2e6; color: #ffc107;">${{ steps.parse.outputs.skipped }}</td>
                  </tr>
                </table>

                <!-- Module Breakdown -->
                <h3 style="color: #333;">🧩 Modules Covered</h3>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                  <tr style="background: #f8f9fa;">
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">1. Youth Registration</td>
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">5. Certificate Verification</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">2. Logout</td>
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">6. Basic Info</td>
                  </tr>
                  <tr style="background: #f8f9fa;">
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">3. Login (OTP)</td>
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">7. Quiz Attempt</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;">4. Profile Completion</td>
                    <td style="padding: 8px 12px; border: 1px solid #dee2e6;"></td>
                  </tr>
                </table>

                <!-- Actions Link -->
                <div style="text-align: center; margin: 25px 0;">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" 
                     style="background: #160363; color: white; padding: 12px 30px; text-decoration: none; border-radius: 6px; font-weight: bold;">
                    📄 View Full Report & Artifacts
                  </a>
                </div>

                <p style="color: #666; font-size: 13px; text-align: center;">
                  The detailed HTML report (index.html) and failure screenshots are available as downloadable artifacts in the link above.
                </p>
              </div>

              <!-- Footer -->
              <div style="background: #f8f9fa; padding: 15px; text-align: center; border-top: 1px solid #e0e0e0;">
                <p style="color: #888; font-size: 12px; margin: 0;">
                  MY Bharat | QA Automation Team | Nishant Sharma<br>
                  Scheduled Daily Run — 8:00 AM & 4:00 PM IST
                </p>
              </div>
            </div>
          attachments: reports/index.html
